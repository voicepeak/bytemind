name: PR Checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  quick-check:
    name: PR Quick Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Run go vet
        run: go vet ./...

      - name: Run full test suite with coverage
        run: |
          TEST_PKGS=$(go list -f '{{if or .TestGoFiles .XTestGoFiles}}{{.ImportPath}}{{end}}' ./... | sed '/^$/d')
          go test $TEST_PKGS -coverprofile=coverage.out

      - name: Print coverage summary
        run: go tool cover -func=coverage.out

      - name: Run focused coverage checks
        run: go test -cover ./internal/agent ./internal/tools ./internal/provider ./tui

      - name: Upload coverage to Codecov
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          flags: pr-linux
          name: pr-linux
          fail_ci_if_error: true
          verbose: true
